    <style>
      /* 干净重置 + 现代字体 (偏向西方审美) */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          "Inter",
          sans-serif;
      }

      body {
        background-color: #f5f7fb;
        color: #121826;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1.5rem 1.5rem;
        width: 100%;
        flex: 1;
      }

      /* ----- 顶端公司介绍 (简洁国际风) ----- */
      .company-header {
        margin-bottom: 3rem;
        padding: 2.5rem 2rem;
        background: #ffffff;
        border-radius: 2.5rem;
        box-shadow: 0 8px 28px -10px rgba(0, 30, 60, 0.08);
        border: 1px solid rgba(190, 206, 225, 0.3);
        text-align: center;
      }

      .company-header h1 {
        font-size: clamp(2.2rem, 7vw, 3.6rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        background: linear-gradient(145deg, #162b40, #1d4a6b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .company-header .en-tagline {
        font-size: 1.5rem;
        font-weight: 350;
        color: #2c4059;
        margin-top: 0.5rem;
      }

      .company-header .zh-tagline {
        font-size: 1.1rem;
        color: #5f6f82;
        margin-top: 0.75rem;
        border-top: 1px solid #dce5ed;
        padding-top: 1rem;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        font-weight: 350;
      }

      /* ----- 产品网格 (一行三个自适应) ----- */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 默认三列 */
        gap: 1.8rem;
        margin: 2.2rem 0 3rem;
      }

      /* 中等屏幕变两列 */
      @media (max-width: 900px) {
        .product-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      /* 手机屏幕一列 */
      @media (max-width: 560px) {
        .product-grid {
          grid-template-columns: 1fr;
        }
      }

      /* 产品卡片 — 现代微质感，西方用户喜爱 */
      .product-card {
        background: #ffffff;
        border-radius: 2rem;
        overflow: hidden;
        box-shadow: 0 12px 28px -12px rgba(0, 30, 60, 0.12);
        transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
        cursor: pointer;
        border: 1px solid #e2eaf1;
        display: flex;
        flex-direction: column;
        height: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      /* 悬停浮动 (桌面) */
      .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 28px 38px -14px rgba(0, 45, 80, 0.2);
        border-color: #b8cfec;
      }

      /* 点击轻微浮动 (active) */
      .product-card:active {
        transform: translateY(-3px) scale(0.99);
        box-shadow: 0 18px 28px -12px rgba(0, 65, 110, 0.25);
        transition: all 0.08s;
      }

      /* 图片区域 (自适应比例) */
      .card-img {
        width: 100%;
        aspect-ratio: 4 / 3; /* 西方常见产品比例 */
        overflow: hidden;
        background-color: #e6edf4;
      }

      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s ease;
      }

      .product-card:hover .card-img img {
        transform: scale(1.02);
      }

      /* 卡片文字信息 (英文为主，中文辅助) */
      .card-info {
        padding: 1.4rem 1.2rem 1.6rem 1.2rem;
        background: white;
        flex: 1;
      }

      .product-name-en {
        font-size: 1.6rem;
        font-weight: 600;
        color: #0b283e;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }

      .product-name-zh {
        font-size: 1.1rem;
        color: #5b6f84;
        font-weight: 350;
        margin: 0.25rem 0 0.5rem 0;
        border-left: 3px solid #9bb8da;
        padding-left: 0.65rem;
      }

      .product-desc-en {
        font-size: 1rem;
        color: #1e3b5a;
        font-weight: 400;
        margin-bottom: 0.2rem;
      }

      .product-desc-zh {
        font-size: 0.9rem;
        color: #68788c;
        font-weight: 350;
      }

      /* ----- 模态框 (四张详情图 + 介绍) 干净卡片----- */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(10, 25, 40, 0.7);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 1.2rem;
      }

      .modal-overlay.show {
        display: flex;
      }

      .modal-content {
        background: #ffffff;
        border-radius: 2.8rem;
        max-width: 1050px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 40px 70px rgba(0, 20, 50, 0.3);
        padding: 2.2rem 2rem;
        position: relative;
        animation: fadeScale 0.2s ease;
      }

      @keyframes fadeScale {
        from {
          opacity: 0.6;
          transform: scale(0.97);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .modal-close {
        position: absolute;
        top: 1.2rem;
        right: 1.5rem;
        background: #f0f4fa;
        border: none;
        width: 2.8rem;
        height: 2.8rem;
        border-radius: 50%;
        font-size: 2.2rem;
        line-height: 1;
        cursor: pointer;
        color: #1d384e;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        border: 1px solid #c9d9e8;
      }

      .modal-close:hover {
        background: #e3ecf5;
        transform: rotate(90deg);
      }

      .modal-close:active {
        background: #cbdbea;
        transform: scale(0.95);
      }

      /* 模态框内标题 (中英) */
      .modal-product-title {
        margin-bottom: 2rem;
        padding-right: 2.5rem;
      }

      .modal-name-en {
        font-size: 2.4rem;
        font-weight: 600;
        color: #0b283e;
        line-height: 1.2;
      }

      .modal-name-zh {
        font-size: 1.4rem;
        color: #546e84;
        font-weight: 350;
        margin-top: 0.2rem;
      }

      /* 四张详情图网格 — 完全自适应 */
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.2rem;
        margin: 2rem 0 1.8rem;
      }

      .detail-item {
        background: #f5f9ff;
        border-radius: 1.8rem;
        overflow: hidden;
        border: 1px solid #dae4ef;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.02);
      }

      .detail-item img {
        width: 100%;
        height: auto;
        display: block;
        aspect-ratio: 4/3;
        object-fit: cover;
        transition: 0.2s;
      }

      .detail-item img:hover {
        transform: scale(1.01);
      }

      /* 详细介绍区域 (中英) */
      .modal-description {
        background: #edf4fc;
        padding: 1.8rem 2rem;
        border-radius: 2.2rem;
        margin-top: 0.8rem;
        border: 1px solid #d0e0ef;
      }

      .modal-description .en-desc {
        font-size: 1.2rem;
        color: #0f3b5e;
        font-weight: 500;
      }

      .modal-description .zh-desc {
        font-size: 1.05rem;
        color: #2b4d6a;
        font-weight: 350;
        margin-top: 0.4rem;
      }

      .modal-description .extra-info {
        margin-top: 0.8rem;
        font-size: 0.95rem;
        color: #406e8c;
      }

      /* ----- 页脚 地址/电话/邮箱 (国际化风格)----- */
      .footer {
        background: #0f1b28;
        color: #d1e0eb;
        padding: 2.5rem 2rem;
        border-radius: 3.5rem 3.5rem 1.8rem 1.8rem;
        margin-top: 3rem;
      }

      .footer-inner {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 2rem;
      }

      .footer-contact {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }

      .footer-contact div {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .footer-contact i {
        font-style: normal;
        opacity: 0.8;
        min-width: 1.8rem;
        font-size: 1.2rem;
      }

      .footer-note {
        text-align: right;
        font-size: 0.95rem;
        color: #a1bbd0;
      }

      @media (max-width: 650px) {
        .footer-inner {
          flex-direction: column;
          align-items: flex-start;
          text-align: left;
        }
        .footer-note {
          text-align: left;
        }
      }
    </style>
  </head>

        // ---------- DOM 元素 ----------
        const productGrid = document.getElementById("productGrid");
        const modalOverlay = document.getElementById("modalOverlay");
        const modalDynamic = document.getElementById("modalDynamicArea");
        const closeModalBtn = document.getElementById("closeModalBtn");

        // ---------- 渲染卡片 (一行三个，完全自适应) ----------
        function renderCards() {
          let html = "";
          products.forEach((prod) => {
            html += `
                        <div class="product-card" data-id="${prod.id}">
                            <div class="card-img">
                                <img src="${prod.image}" alt="${prod.nameEn}" loading="lazy">
                            </div>
                            <div class="card-info">
                                <div class="product-name-en">${prod.nameEn}</div>
                                <div class="product-name-zh">${prod.nameZh}</div>
                                <div class="product-desc-en">${prod.descEn}</div>
                                <div class="product-desc-zh">${prod.descZh}</div>
                            </div>
                        </div>
                    `;
          });
          productGrid.innerHTML = html;

          // 为每个卡片绑定点击事件
          document.querySelectorAll(".product-card").forEach((card) => {
            card.addEventListener("click", function (e) {
              const id = parseInt(this.dataset.id);
              const product = products.find((p) => p.id === id);
              if (product) openModal(product);
            });
          });
        }

        // ---------- 打开模态框并填充四图+介绍 ----------
        function openModal(product) {
          // 生成四张详情图 HTML
          let detailImgs = "";
          product.details.forEach((imgUrl) => {
            detailImgs += `
                        <div class="detail-item">
                            <img src="${imgUrl}" alt="${product.nameEn} detail" loading="lazy">
                        </div>
                    `;
          });

          // 模态框内容 (中英介绍)
          const modalHtml = `
                    <div class="modal-product-title">
                        <div class="modal-name-en">${product.nameEn}</div>
                        <div class="modal-name-zh">${product.nameZh}</div>
                    </div>
                    <div class="detail-grid">
                        ${detailImgs}
                    </div>
                    <div class="modal-description">
                        <div class="en-desc"> ${product.descEn} </div>
                        <div class="zh-desc"> ${product.descZh} </div>
                        <div class="extra-info"></div>
                    </div>
                `;

          modalDynamic.innerHTML = modalHtml;
          modalOverlay.classList.add("show");
          document.body.style.overflow = "hidden"; // 禁止背景滚动
        }

        // ---------- 关闭模态框 ----------
        function closeModal() {
          modalOverlay.classList.remove("show");
          document.body.style.overflow = "";
        }

        // ---------- 事件绑定 (关闭) ----------
        closeModalBtn.addEventListener("click", closeModal);

        // 点击遮罩关闭
        modalOverlay.addEventListener("click", function (e) {
          if (e.target === modalOverlay) closeModal();
        });

        // ESC 键关闭
        window.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && modalOverlay.classList.contains("show"))
            closeModal();
        });

        // 启动渲染
        renderCards();

        // 确保所有图片优雅降级 (picsum 99.9%可用)
      })();
    </script>
